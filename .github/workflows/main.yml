name: GHA-CICD 

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: 'npm'

      # - name: Install dependencies
      #   run: npm ci --legacy-peer-deps

      # - name: Build React App
      #   run: npm run build

  test:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
          # cache-from: type=local,src=/tmp/.buildx-cache
          # cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          # cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/xora:buildcache
          # cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/xora:buildcache,mode=max

  security:
    needs: docker
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}

  deploy:
    needs: security
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set kubeconfig for k3s
        run: |
          mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chown $USER:$USER ~/.kube/config
          export KUBECONFIG=~/.kube/config
          kubectl get nodes

      - name: Deploy to k3s
        run: |
          export KUBECONFIG=~/.kube/config

          # 1. Update image tag
          NEW_IMAGE="${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}"
          sed -i "s|image:.*|image: ${NEW_IMAGE}|g" k3s/deployment.yaml

          # 2. Apply manifests
          kubectl apply -f k3s/

          # 3. Check rollout
          kubectl rollout status deployment/app-fe-deployment -n xora
